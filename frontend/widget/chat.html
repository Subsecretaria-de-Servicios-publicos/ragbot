<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Inter', sans-serif; background: #f8f8fc; height: 100vh; display: flex; flex-direction: column; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  :root { --color: #6c63ff; }

  .chat-header {
    background: var(--color); color: #fff; padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .chat-avatar { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .chat-title { font-size: 15px; font-weight: 600; }
  .chat-subtitle { font-size: 12px; opacity: 0.75; }

  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .chat-messages::-webkit-scrollbar { width: 5px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

  .msg { display: flex; gap: 10px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--color);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    color: #fff; flex-shrink: 0; }
  .msg.user .msg-avatar { background: #e8e8f5; color: #555; }
  .bubble { max-width: 72%; padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
  .msg.bot .bubble { background: #fff; border-bottom-left-radius: 4px; color: #1a1a2e;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .msg.user .bubble { background: var(--color); color: #fff; border-bottom-right-radius: 4px; }
  .sources { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .src-tag { background: #f0f0f8; color: #666; font-size: 11px; padding: 3px 10px; border-radius: 20px; }
  .msg-time { font-size: 10px; color: #bbb; margin-top: 3px; }

  .typing { display: flex; align-items: center; gap: 4px; padding: 12px 15px; background: #fff;
    border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .typing span { width: 7px; height: 7px; background: #bbb; border-radius: 50%; animation: dot 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100% { transform:scale(0.6); opacity:0.4; } 40% { transform:scale(1); opacity:1; } }

  .chat-input-area {
    background: #fff; border-top: 1px solid #eee;
    padding: 14px 20px; display: flex; gap: 10px; align-items: flex-end;
  }
  #page-input {
    flex:1; border: 1.5px solid #e8e8f0; border-radius: 22px;
    padding: 10px 16px; font-size: 14px; outline: none; resize: none;
    font-family: inherit; max-height: 110px; line-height: 1.4; transition: border-color 0.15s;
  }
  #page-input:focus { border-color: var(--color); }
  #page-send {
    width: 42px; height: 42px; border-radius: 50%; background: var(--color);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: filter 0.15s, transform 0.15s; flex-shrink: 0;
  }
  #page-send:hover { filter: brightness(1.1); transform: scale(1.05); }
  #page-send svg { width: 16px; height: 16px; }

  .welcome-card { background: linear-gradient(135deg, var(--color), #a78bfa);
    border-radius: 14px; padding: 18px; color: #fff; }
  .welcome-card h2 { font-size: 16px; margin-bottom: 4px; }
  .welcome-card p { font-size: 13px; opacity: 0.85; }
</style>
</head>
<body>
<div class="chat-header">
  <div class="chat-avatar" id="pg-avatar">🤖</div>
  <div>
    <div class="chat-title" id="pg-bot-name">Cargando...</div>
    <div class="chat-subtitle">● En línea</div>
  </div>
</div>

<div class="chat-messages" id="pg-messages"></div>

<div class="chat-input-area">
  <textarea id="page-input" placeholder="Escribe tu mensaje..." rows="1" maxlength="2000"></textarea>
  <button id="page-send">
    <svg fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const BOT_ID = window.location.pathname.split('/').pop() || params.get('bot');
const API_URL = window.RAGBOT_API_URL || params.get('api') || 'http://localhost:8000';
let SESSION_ID = 'page_' + Math.random().toString(36).slice(2);
let typing = false;

async function initChat() {
  try {
    const res = await fetch(`${API_URL}/api/v1/chatbots/${BOT_ID}`);
    if (!res.ok) throw new Error('Bot no encontrado');
    const bot = await res.json();
    document.getElementById('pg-bot-name').textContent = bot.bot_name || bot.name;
    document.getElementById('pg-avatar').textContent = bot.bot_avatar_url || '🤖';
    document.title = bot.bot_name || bot.name;
    document.documentElement.style.setProperty('--color', (bot.widget_config?.primary_color) || '#6c63ff');

    const msgs = document.getElementById('pg-messages');
    msgs.innerHTML = `
      <div class="welcome-card">
        <h2>${bot.bot_name || bot.name}</h2>
        <p>Pregúntame sobre los documentos disponibles</p>
      </div>`;
    appendMessage('bot', bot.welcome_message || '¡Hola! ¿En qué puedo ayudarte?');
  } catch(e) {
    document.getElementById('pg-bot-name').textContent = 'Bot no disponible';
  }
}

function appendMessage(role, content, sources = []) {
  const msgs = document.getElementById('pg-messages');
  const time = new Date().toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' });
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = `
    <div class="msg-avatar">${role === 'bot' ? '🤖' : '👤'}</div>
    <div>
      <div class="bubble">${content.replace(/\n/g,'<br>')}
        ${sources.length ? `<div class="sources">${sources.map(s=>`<span class="src-tag">📎 ${s}</span>`).join('')}</div>` : ''}
      </div>
      <div class="msg-time">${time}</div>
    </div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('pg-messages');
  const el = document.createElement('div');
  el.id = 'typing-ind'; el.className = 'msg bot';
  el.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('page-input');
  const text = input.value.trim();
  if (!text || typing) return;
  input.value = ''; input.style.height = 'auto';
  appendMessage('user', text);
  showTyping(); typing = true;

  try {
    const res = await fetch(`${API_URL}/api/v1/chat/${BOT_ID}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: SESSION_ID }),
    });
    const data = await res.json();
    document.getElementById('typing-ind')?.remove();
    if (!res.ok) throw new Error(data.detail);
    appendMessage('bot', data.answer, data.sources || []);
  } catch(e) {
    document.getElementById('typing-ind')?.remove();
    appendMessage('bot', 'Ocurrió un error. Intenta nuevamente.');
  } finally { typing = false; }
}

document.getElementById('page-send').addEventListener('click', sendMessage);
document.getElementById('page-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('page-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});

initChat();
</script>
</body>
</html>
