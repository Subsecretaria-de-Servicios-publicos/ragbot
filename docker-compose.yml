version: '3.9'

services:
  # ─── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragbot_db
      POSTGRES_USER: ragbot_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragbot_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragbot_user -d ragbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ragbot_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend FastAPI ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragbot_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ragbot_user:${POSTGRES_PASSWORD:-ragbot_secure_pass}@postgres:5432/ragbot_db
      DATABASE_URL_SYNC: postgresql://ragbot_user:${POSTGRES_PASSWORD:-ragbot_secure_pass}@postgres:5432/ragbot_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-cambia_esto_obligatoriamente}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DEBUG: ${DEBUG:-false}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Dashboard (Nginx) ───────────────────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: ragbot_dashboard
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend/dashboard:/usr/share/nginx/html:ro
      - ./docs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"

  # ─── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ragbot_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - dashboard
    volumes:
      - ./docs/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # Para SSL
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  logs_data:
